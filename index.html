<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL DION v23.1 | ULTRA PRECISION HUB</title>
  
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --primary: #3B57EE;
            --primary-dark: #2D44C4;
            --primary-light: rgba(59, 87, 238, 0.08);
            --bg-body: #F1F5F9;
            --bg-card: #FFFFFF;
            --bg-sidebar: #FFFFFF;
            --border: #E2E8F0;
            --text-main: #0F172A;
            --text-dim: #64748B;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --sidebar-w: 90px;
            --header-h: 80px;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 10px 25px -5px rgba(0,0,0,0.05);
            --radius: 20px;
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.dark-mode {
            --bg-body: #020617;
            --bg-card: #0F172A;
            --bg-sidebar: #0F172A;
            --border: #1E293B;
            --text-main: #F1F5F9;
            --text-dim: #94A3B8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
      
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            transition: var(--transition);
        }
        .sidebar {
            width: var(--sidebar-w);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 35px 0;
            z-index: 100;
            flex-shrink: 0;
        }
        .brand {
            width: 58px;
            height: 58px;
            background: linear-gradient(135deg, var(--primary), #6366F1);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            margin-bottom: 50px;
            box-shadow: 0 12px 24px rgba(59, 87, 238, 0.25);
        }
        .nav-items {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }
        .nav-link {
            width: 58px;
            height: 58px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: var(--text-dim);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            position: relative;
        }
        .nav-link i { font-size: 26px; }
        .nav-link span { font-size: 9px; font-weight: 800; margin-top: 4px; text-transform: uppercase; }
        .nav-link:hover { color: var(--primary); background: var(--primary-light); }
        .nav-link.active { color: var(--primary); background: var(--primary-light); }
        .nav-link.active::before {
            content: '';
            position: absolute;
            left: -18px;
            width: 5px;
            height: 30px;
            background: var(--primary);
            border-radius: 0 4px 4px 0;
        }
        .main-container { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        header {
            height: var(--header-h);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 45px;
            z-index: 90;
            flex-shrink: 0;
        }
        .header-title h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .header-info { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .live-badge {
            background: #ECFDF5;
            color: var(--success);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .quick-links { display: flex; gap: 12px; align-items: center; }
        .quick-links a { color: var(--primary); font-size: 20px; text-decoration: none; transition: var(--transition); }
        .quick-links a:hover { transform: scale(1.15); opacity: 0.8; }
        .content-body {
            flex: 1;
            padding: 35px 45px;
            overflow-y: auto;
        }
        .module { display: none; animation: fadeIn 0.4s ease-out; }
        .module.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chart-container {
            height: 70vh;
            min-height: 500px;
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            position: relative;
        }
        #tradingview_pro { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .chart-skeleton {
            position: absolute; inset: 0; background: linear-gradient(90deg, rgba(200,200,200,0.1) 25%, rgba(180,180,180,0.15) 50%, rgba(200,200,200,0.1) 75%);
            background-size: 200% 100%; animation: loading 1.8s infinite; z-index: 1;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; max-width: 700px; margin: 0 auto; box-shadow: var(--shadow-md); }
        .card-head { margin-bottom: 35px; display: flex; align-items: center; gap: 15px; }
        .card-head i { font-size: 24px; color: var(--primary); }
        .card-head h3 { font-size: 18px; font-weight: 800; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 11px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.8px; }
        input, select {
            width: 100%; padding: 16px 20px; border: 1px solid var(--border); border-radius: 16px;
            background: var(--bg-body); color: var(--text-main); font-family: inherit; font-size: 15px; font-weight: 600;
            outline: none; transition: var(--transition);
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 5px var(--primary-light); background: var(--bg-card); }
        .result-panel {
            margin-top: 30px; padding: 35px; border-radius: 20px; text-align: center;
            background: var(--bg-body); border: 2px dashed var(--border); transition: var(--transition);
        }
        .result-panel.highlight { background: var(--primary-light); border-color: var(--primary); }
        .result-panel.up { background: #ECFDF5; border-color: var(--success); color: var(--success); }
        .result-panel.down { background: #FEF2F2; border-color: var(--danger); color: var(--danger); }
        .val-large { font-size: 38px; font-weight: 800; display: block; line-height: 1.2; }
        .val-label { font-size: 11px; font-weight: 700; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
        .btn-action {
            width: 100%; padding: 18px; background: var(--primary); color: white; border: none;
            border-radius: 16px; font-weight: 800; font-size: 15px; cursor: pointer;
            transition: var(--transition); margin-top: 10px;
        }
        .btn-action:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 87, 238, 0.2); }
        footer {
            height: 45px; background: var(--bg-card); border-top: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 45px; font-size: 11px; font-weight: 700;
            color: var(--text-dim); justify-content: space-between; flex-shrink: 0;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .sidebar { width: 80px; }
            header, footer, .content-body { padding-left: 20px; padding-right: 20px; }
            .chart-container { min-height: 400px; height: 60vh; }
            .quick-links { gap: 8px; }
            .quick-links a { font-size: 18px; }
        }
    </style>
</head>
<body id="app">
    <aside class="sidebar">
        <div class="brand"><i class='bx bxs-terminal'></i></div>
        <div class="nav-items">
            <div class="nav-link active" onclick="switchTab('tab-chart', this)">
                <i class='bx bx-area'></i><span>Chart</span>
            </div>
            <div class="nav-link" onclick="switchTab('tab-news', this)">
                <i class='bx bx-news'></i><span>News</span>
            </div>
            <div class="nav-link" onclick="switchTab('tab-lot', this)">
                <i class='bx bx-calculator'></i><span>Lot</span>
            </div>
            <div class="nav-link" onclick="switchTab('tab-settings', this)">
                <i class='bx bx-cog'></i><span>Set</span>
            </div>
        </div>
        <div class="nav-link" onclick="toggleTheme()" style="margin-top: auto;">
            <i class='bx bx-moon' id="theme-icon"></i>
        </div>
    </aside>

    <div class="main-container">
        <header>
            <div class="header-title">
                <h2 id="head-text">TERMINAL <span style="color:var(--primary)">DION</span></h2>
            </div>
            <div class="header-info">
                <div class="live-badge" id="badge-p">XAUUSD Focus</div>
                <div style="font-weight: 800; font-size: 14px; color: var(--text-dim);" id="clock">00:00:00</div>

                <!-- Quick Links baru -->
                <div class="quick-links">
                    <a href="https://www.forexfactory.com/calendar" target="_blank" title="Forex Factory Calendar">
                        <i class='bx bx-calendar-event'></i>
                    </a>
                    <a href="https://www.tradingview.com/chart/" target="_blank" title="TradingView Full Chart">
                        <i class='bx bx-line-chart'></i>
                    </a>
                    <a href="https://open.spotify.com/" target="_blank" title="Spotify (Musik Chill)">
                        <i class='bx bxl-spotify'></i>
                    </a>
                </div>
            </div>
        </header>

        <main class="content-body">
            <div id="tab-chart" class="module active">
                <div class="chart-container">
                    <div class="chart-skeleton" id="chart-skel"></div>
                    <div id="tradingview_pro"></div>
                </div>
            </div>

            <div id="tab-news" class="module">
                <div class="card">
                    <div class="card-head">
                        <i class='bx bx-radar'></i>
                        <h3 data-lang="t_news">Economic Logic Predictor</h3>
                    </div>
                    <div class="form-group">
                        <label data-lang="l_type">Event Type</label>
                        <select id="n-type" onchange="debounceRunNews()">
                            <option value="percent">Percentage (CPI, Rates, GDP)</option>
                            <option value="normal">Normal Index (NFP, Jobs)</option>
                            <option value="unemployment">Unemployment (Inverse Logic)</option>
                        </select>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label data-lang="l_prev">Previous</label>
                            <input type="number" step="0.01" id="n-prev" placeholder="0.00" oninput="debounceRunNews()">
                        </div>
                        <div class="form-group">
                            <label data-lang="l_forc">Forecast</label>
                            <input type="number" step="0.01" id="n-forc" placeholder="0.00" oninput="debounceRunNews()">
                        </div>
                    </div>
                    <div class="form-group">
                        <label data-lang="l_act">Actual Release</label>
                        <input type="number" step="0.01" id="n-act" placeholder="Input when data is out..." oninput="debounceRunNews()">
                    </div>
                    <div id="news-res-panel" class="result-panel highlight">
                        <span class="val-label" id="n-stat" data-lang="st_wait">Waiting for analysis...</span>
                        <span class="val-large" id="n-result" style="font-size: 26px;">0.0000</span>
                    </div>
                </div>
            </div>

            <div id="tab-lot" class="module">
                <div class="card">
                    <div class="card-head">
                        <i class='bx bx-shield-quarter'></i>
                        <h3 data-lang="t_lot">Position Sizing</h3>
                    </div>
                    <div class="form-group">
                        <label data-lang="l_bal">Balance (USD)</label>
                        <input type="number" step="1" min="0" id="l-bal" value="1000" oninput="debounceRunLot()">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label data-lang="l_risk">Risk %</label>
                            <input type="number" step="0.1" min="0" max="100" id="l-risk" value="1" oninput="debounceRunLot()">
                        </div>
                        <div class="form-group">
                            <label data-lang="l_sl">Stop Loss (Pips)</label>
                            <input type="number" step="1" min="1" id="l-sl" value="20" oninput="debounceRunLot()">
                        </div>
                    </div>
                    <div class="result-panel highlight" style="margin-top: 50px;">
                        <span class="val-label" data-lang="res_lot">Recommended Lot Size</span>
                        <span class="val-large" id="l-res" style="color: var(--primary);">0.05</span>
                        
                        <!-- Risk in Amount baru -->
                        <div style="margin-top: 15px; font-size: 14px; font-weight: 600; color: var(--text-dim);">
                            Anda meresikokan <span id="risk-amount" style="color: var(--danger); font-weight: 800;">$0.00</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-settings" class="module">
                <div class="card">
                    <div class="card-head">
                        <i class='bx bx-slider'></i>
                        <h3 data-lang="t_set">Terminal Configuration</h3>
                    </div>
                    <div class="form-group">
                        <label data-lang="l_name">Trader Identity</label>
                        <input type="text" id="s-name" placeholder="Dion Batam">
                    </div>
                    <div class="form-group">
                        <label data-lang="l_lang">Interface Language</label>
                        <select id="s-lang" onchange="applyLang()">
                            <option value="id">Bahasa Indonesia</option>
                            <option value="en">English (Professional)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label data-lang="l_pair">Default Asset Focus</label>
                        <select id="s-pair" onchange="updatePair()">
                            <option value="XAUUSD">XAUUSD (GOLD)</option>
                            <option value="EURUSD">EURUSD</option>
                            <option value="GBPUSD">GBPUSD</option>
                            <option value="BTCUSD">BITCOIN</option>
                        </select>
                    </div>
                    <button class="btn-action" onclick="saveData()" data-lang="btn_save">Apply All Changes</button>
                </div>
            </div>
        </main>

        <footer>
            <div><i class='bx bx-check-double'></i> <span id="foot-user">Dion Batam</span> | <span id="foot-pair">XAUUSD</span></div>
            <div>Batam Quant Hub v23.1 Stable</div>
        </footer>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Multi-Language Database
        const dictionary = {
            id: {
                t_news: "Prediksi Logika Berita", t_lot: "Kalkulator Ukuran Lot", t_set: "Konfigurasi Terminal",
                l_type: "Tipe Peristiwa", l_prev: "Sebelumnya", l_forc: "Ramalan", l_act: "Rilis Aktual",
                l_bal: "Saldo Akun (USD)", l_risk: "Resiko %", l_sl: "Stop Loss (Pips)",
                l_name: "Identitas Trader", l_lang: "Bahasa Antarmuka", l_pair: "Fokus Aset Utama",
                st_wait: "Menunggu analisa...", res_lot: "Ukuran Lot Rekomendasi", btn_save: "Terapkan Perubahan",
                bullish: "MATA UANG MENGUAT", bearish: "MATA UANG MELEMAH",
                p_wait: "PREDIKSI: ", p_res: "HASIL: "
            },
            en: {
                t_news: "Economic Logic Predictor", t_lot: "Position Sizing", t_set: "Terminal Configuration",
                l_type: "Event Type", l_prev: "Previous", l_forc: "Forecast", l_act: "Actual Release",
                l_bal: "Account Balance (USD)", l_risk: "Risk %", l_sl: "Stop Loss (Pips)",
                l_name: "Trader Identity", l_lang: "Interface Language", l_pair: "Default Asset Focus",
                st_wait: "Waiting for analysis...", res_lot: "Recommended Lot Size", btn_save: "Apply All Changes",
                bullish: "CURRENCY STRENGTHENING", bearish: "CURRENCY WEAKENING",
                p_wait: "PREDICTION: ", p_res: "RESULT: "
            }
        };

        let tvWidget = null;
        let chartLoaded = false;

        function switchTab(tabId, el) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');

            if (tabId === 'tab-chart' && !chartLoaded) {
                loadChart();
                chartLoaded = true;
            }
        }

        function loadChart() {
            document.getElementById('chart-skel').style.display = 'block';

            const theme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
            const pair = document.getElementById('s-pair')?.value || "OANDA:XAUUSD";

            if (tvWidget) {
                tvWidget.remove();
                tvWidget = null;
            }

            tvWidget = new TradingView.widget({
                autosize: true,
                symbol: pair,
                interval: "H1",
                timezone: "Asia/Jakarta",
                theme: theme,
                style: "1",
                locale: document.getElementById('s-lang')?.value || "id",
                enable_publishing: false,
                allow_symbol_change: true,
                container_id: "tradingview_pro"
            });

            setTimeout(() => {
                document.getElementById('chart-skel').style.display = 'none';
            }, 1500);
        }

        // News + debounce
        let newsTimer;
        function debounceRunNews() {
            clearTimeout(newsTimer);
            newsTimer = setTimeout(runNews, 400);
        }
        function runNews() {
            const lang = document.getElementById('s-lang').value;
            const type = document.getElementById('n-type').value;
            const prev = parseFloat(document.getElementById('n-prev').value) || 0;
            const forc = parseFloat(document.getElementById('n-forc').value) || 0;
            const act = parseFloat(document.getElementById('n-act').value);

            const panel = document.getElementById('news-res-panel');
            const res = document.getElementById('n-result');
            const stat = document.getElementById('n-stat');

            let prediction = "";
            let isUp;

            if (isNaN(prev) || isNaN(forc)) {
                stat.innerText = dictionary[lang].st_wait;
                res.innerText = "";
                panel.className = "result-panel highlight";
                return;
            }

            if (isNaN(act)) {
                isUp = (type === "unemployment") ? (forc < prev) : (forc > prev);
                stat.innerText = dictionary[lang].p_wait;
                prediction = isUp ? dictionary[lang].bullish : dictionary[lang].bearish;
                panel.className = "result-panel highlight";
            } else {
                isUp = (type === "unemployment") ? (act < forc) : (act > forc);
                stat.innerText = dictionary[lang].p_res;
                prediction = isUp ? dictionary[lang].bullish : dictionary[lang].bearish;
                panel.className = isUp ? "result-panel up" : "result-panel down";
            }

            res.innerText = prediction;
        }

        // Lot + debounce + Risk Amount
        let lotTimer;
        function debounceRunLot() {
            clearTimeout(lotTimer);
            lotTimer = setTimeout(runLot, 400);
        }
        function runLot() {
            const bal = parseFloat(document.getElementById('l-bal').value) || 0;
            const risk = parseFloat(document.getElementById('l-risk').value) || 0;
            const sl = parseFloat(document.getElementById('l-sl').value) || 0;

            let lotText = "0.00";
            let riskAmount = 0;

            if (bal > 0 && risk > 0) {
                riskAmount = (bal * (risk / 100)).toFixed(2);
                if (sl > 0) {
                    const lot = (riskAmount / (sl * 10)).toFixed(2);
                    lotText = lot;
                }
            }

            document.getElementById('l-res').innerText = lotText;
            document.getElementById('risk-amount').innerText = `$${riskAmount}`;
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.toggle('dark-mode');
            localStorage.setItem('d-theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').className = isDark ? 'bx bx-sun' : 'bx bx-moon';
            if (chartLoaded) loadChart();
        }

        function applyLang() {
            const l = document.getElementById('s-lang').value;
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.getAttribute('data-lang');
                if (dictionary[l][key]) el.innerText = dictionary[l][key];
            });
        }

        function updatePair() {
            const p = document.getElementById('s-pair').value;
            document.getElementById('badge-p').innerText = p + " Focus";
            document.getElementById('foot-pair').innerText = p;
            if (chartLoaded) loadChart();
        }

        function saveData() {
            localStorage.setItem('d-name', document.getElementById('s-name').value.trim());
            document.getElementById('foot-user').innerText = document.getElementById('s-name').value || "Dion Batam";
            alert("Konfigurasi berhasil disimpan!");
        }

        // Init
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID', {hour12: false});
        }, 1000);

        window.onload = () => {
            const savedName = localStorage.getItem('d-name');
            const savedTheme = localStorage.getItem('d-theme');
            if (savedName) {
                document.getElementById('s-name').value = savedName;
                document.getElementById('foot-user').innerText = savedName;
            }
            if (savedTheme === 'dark') toggleTheme();

            loadChart();
            chartLoaded = true;

            runLot();
            applyLang();
            runNews();
        };
    </script>
</body>
</html>
